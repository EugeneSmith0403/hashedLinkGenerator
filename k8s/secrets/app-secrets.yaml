# Never store real secrets in git!
# Create from .env file:
#   kubectl create secret generic app-secrets \
#     --from-env-file=.env \
#     --namespace=link-generator
#
# Use Sealed Secrets or Vault in production.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: link-generator
type: Opaque
# stringData is populated manually or via CI/CD
stringData:
  DSN: "postgres://postgres:my_pass@postgres:5432/link"
  TOKEN: ""
  EXPIRED_AT: "24h"
  REDIS_ADDR: "redis:6379"
  REDIS_USER: ""
  REDIS_USER_PASSWORD: ""
  REDIS_PASSWORD: ""
  REDIS_CACHE: "1"
  RABBITMQ_USER: ""
  RABBITMQ_PASSWORD: ""
  RABBITMQ_CONSUMERS: "2"
  RABBITNQ_AMQP: "amqp://user:pass@rabbitmq:5672/"
  CLICKHOUSE_ADDR: "clickhouse:9000"
  CLICKHOUSE_DB: ""
  CLICKHOUSE_USER: ""
  CLICKHOUSE_PASSWORD: ""
  STRIPE_TOKEN: ""
  STRIPE_WEBHOOK_SECRET: ""
  STRIPE_RETURN_URL: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: ""
  GEOIP_PATH: "/app/GeoLite2-City.mmdb"
  MODE: "production"
