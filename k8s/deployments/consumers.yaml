---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-stats
  namespace: link-generator
spec:
  replicas: 2                # stats may need more replicas under load — see HPA
  selector:
    matchLabels:
      app: consumer-stats
  template:
    metadata:
      labels:
        app: consumer-stats
    spec:
      containers:
      - name: consumer-stats
        image: your-registry/link-generator-consumer-stats:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
