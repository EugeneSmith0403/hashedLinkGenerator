---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-payment
  namespace: link-generator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: consumer-payment
  template:
    metadata:
      labels:
        app: consumer-payment
    spec:
      containers:
      - name: consumer-payment
        image: your-registry/link-generator-consumer-payment:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
